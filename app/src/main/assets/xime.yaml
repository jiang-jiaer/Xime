      s: "木丁西"
      a: "工匚戈艹廿龷七弋戈"
      
      # 第二区：竖起笔 (2)
      h: "目丨卜⺊上止龰"
      j: "日曰早廾刂虫丿Ⅱ"
      k: "口Ⅲ川"
      l: "田甲囗四罒车皿力"
      m: "山由贝冂冎几"
      
      # 第三区：撇起笔 (3)
      t: "禾竹丿𠂉彳夂攵"
      r: "白手龵扌斤𰀪𠂆"
      e: "月⺼彡乃用爫彡𧘇豕"
      w: "人亻八癶"
      q: "金 钅𠂊勺㐅 犭𱼀"
      
      # 第四区：捺起笔 (4)
      y: "言讠文方广亠丶乀"
      u: "立六辛冫丬门疒丷䒑"
